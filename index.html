<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芝電電車まつりダイヤ Webビューア</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    .view-panel { display: none; }
    .view-panel.active { display: block; }
    .table-container { overflow-x: auto; height: calc(100vh - 250px); border: 1px solid #e2e8f0; border-radius: 0.5rem; background-color: #fff; }
    table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 0.875rem; }
    th { background: #e2e8f0; padding: 8px var(--col-padding, 8px); border-bottom: 2px solid #cbd5e1; white-space: nowrap; position: sticky; top: 0; z-index: 10; color: #334155; font-weight: 600; text-align: center; }
    .data-row td { padding: var(--row-padding, 6px) var(--col-padding, 8px); border-bottom: 1px solid #f1f5f9; text-align: center; vertical-align: middle; transition: background-color 0.1s; white-space: nowrap; }
    tr:nth-child(even) { background-color: #fafafa; }
    .data-row:hover { background-color: #f0fdf4; }
    .row-checked td { opacity: 0.5; background-color: #f1f5f9 !important; text-decoration: line-through; }
    input[type="checkbox"] { width: 1.25rem; height: 1.25rem; cursor: pointer; accent-color: #2563eb; }
    
    /* ダイヤグラム用 */
    .diagram-container { overflow: hidden; height: calc(100vh - 300px); border: 1px solid #e2e8f0; border-radius: 0.5rem; background-color: #fff; position: relative; }
    #diagram-canvas { cursor: grab; display: block; width: 100%; height: 100%; }
    #diagram-canvas:active { cursor: grabbing; }

    /* 短冊（ストリップ）用のカスタムスクロールバー */
    .strip-container { height: calc(100vh - 250px); overflow-y: auto; }
</style>
</head>
<body class="bg-slate-100 p-2 md:p-4 text-slate-800">
<div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-3 bg-white p-4 rounded-lg shadow-sm border border-slate-200">

        <div class="flex items-center gap-3 flex-wrap">
            <div class="flex items-center gap-1 bg-slate-50 px-3 py-1.5 rounded-md border border-slate-200">

                <button id="row-pad-dec" class="px-2 py-0.5 bg-white border border-slate-300 rounded hover:bg-slate-100 active:bg-slate-200 text-slate-600 select-none">◁</button>
                <span id="row-pad-val" class="w-6 text-center font-mono text-sm">6</span>
                <button id="row-pad-inc" class="px-2 py-0.5 bg-white border border-slate-300 rounded hover:bg-slate-100 active:bg-slate-200 text-slate-600 select-none">▷</button>
            </div>

                    <span class="font-bold text-slate-700 text-sm">運用選択:</span>

            <div class="strip-container flex justify-center pb-10">

                        <span class="text-xs bg-slate-600 px-2 py-1 rounded">2列車</span>
                    </div>

                    <div class="p-4 flex flex-col gap-6">
                        
                        <div class="relative pl-4 border-l-4 border-blue-500">
                            <div class="absolute -left-[10px] top-0 w-4 h-4 bg-blue-500 rounded-full border-4 border-white"></div>

                                <div>
                                    <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-0.5 rounded border border-blue-200">下り</span>

                                    <tr class="border-b border-slate-100">
                                        <td class="py-2 w-1/3 font-bold text-slate-700">芝鷺駅</td>
                                        <td class="py-2">
                                            <span class="text-slate-400 font-medium px-2 py-1">着 --:--</span>
                                        </td>
                                        <td class="py-2">
                                            <label class="cursor-pointer group inline-flex items-center px-2 py-1 rounded hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all">

                                            </label>

                                    </tr>
                                    <tr class="border-b border-slate-100">
                                        <td class="py-2 w-1/3 font-bold text-slate-700">海老和</td>
                                        <td class="py-2">
                                            <label class="cursor-pointer group inline-flex items-center px-2 py-1 rounded hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all">
                                                <input type="checkbox" class="mr-2 peer accent-blue-600 w-4 h-4">
                                                <span class="font-bold text-slate-700 peer-checked:line-through peer-checked:text-slate-400">着 14:07</span>
                                            </label>
                                        </td>
                                        <td class="py-2">
                                            <label class="cursor-pointer group inline-flex items-center px-2 py-1 rounded hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all">
                                                <input type="checkbox" class="mr-2 peer accent-blue-600 w-4 h-4">
                                                <span class="font-bold text-slate-700 peer-checked:line-through peer-checked:text-slate-400">発 14:08</span>
                                            </label>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td class="py-2 w-1/3 font-bold text-slate-700">芝鷺港</td>
                                        <td class="py-2">
                                            <label class="cursor-pointer group inline-flex items-center px-2 py-1 rounded hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all">
                                                <input type="checkbox" class="mr-2 peer accent-blue-600 w-4 h-4">
                                                <span class="font-bold text-slate-700 peer-checked:line-through peer-checked:text-slate-400">着 14:15</span>
                                            </label>
                                        </td>
                                        <td class="py-2">
                                            <span class="text-slate-400 font-medium px-2 py-1">発 --:--</span>
                                        </td>

                            </table>
                        </div>

                        <div class="flex justify-center -my-3">
                            <span class="text-slate-300">▼ 折り返し ▼</span>

                        <div class="relative pl-4 border-l-4 border-orange-500">
                            <div class="absolute -left-[10px] top-0 w-4 h-4 bg-orange-500 rounded-full border-4 border-white"></div>

                            <div class="flex justify-between items-end mb-3">
                                <div>
                                    <span class="bg-orange-100 text-orange-800 text-xs font-bold px-2 py-0.5 rounded border border-orange-200">上り</span>
                                    <h3 class="text-lg font-extrabold text-slate-800 inline-block ml-2">1003列車</h3>
                                </div>
                                <span class="text-sm font-bold text-slate-500">種別: 普通</span>
                            </div>

                            <table class="w-full text-sm">
                                <tbody>
                                    <tr class="border-b border-slate-100">
                                        <td class="py-2 w-1/3 font-bold text-slate-700">芝鷺港</td>
                                        <td class="py-2">
                                            <span class="text-slate-400 font-medium px-2 py-1">着 --:--</span>
                                        </td>

<script>
// --- (既存のスクリプトはそのまま維持し、以下を追加・修正します) ---
const defaultDataText = `FileType=OuDiaSecond.1.17
Rosen.
Rosenmei=芝電電車まつりダイヤ
KudariDiaAlias=港方面
NoboriDiaAlias=駅方面
Eki.
// ... (中略：既存のOuDiaデータはそのまま残してください) ...
.
.
.`;

let data = null;

let rowPadding = 6;
let colPadding = 8;

let diagScaleX = 1.0;
let diagScaleY = 1.0;
let diagOffsetX = 0;
let diagOffsetY = 0;
let isDiagDragging = false;
let diagDragStartX = 0;
let diagDragStartY = 0;
let diagNeedsInit = true;

function updatePadding() {
    document.documentElement.style.setProperty('--row-padding', rowPadding + 'px');
    document.documentElement.style.setProperty('--col-padding', colPadding + 'px');
    document.getElementById('row-pad-val').textContent = rowPadding;
    document.getElementById('col-pad-val').textContent = colPadding;
}

document.getElementById('row-pad-dec').onclick = () => { if(rowPadding > 0) { rowPadding -= 1; updatePadding(); } };
document.getElementById('row-pad-inc').onclick = () => { if(rowPadding < 40) { rowPadding += 1; updatePadding(); } };
document.getElementById('col-pad-dec').onclick = () => { if(colPadding > 0) { colPadding -= 1; updatePadding(); } };
document.getElementById('col-pad-inc').onclick = () => { if(colPadding < 60) { colPadding += 1; updatePadding(); } };

// --- タブ切り替え処理の修正 ---
const tabTimetable = document.getElementById('tab-timetable');
const tabDiagram = document.getElementById('tab-diagram');
const tabUnyo = document.getElementById('tab-unyo');

const viewTimetable = document.getElementById('view-timetable');
const viewDiagram = document.getElementById('view-diagram');
const viewUnyo = document.getElementById('view-unyo');

function resetTabs() {
    tabTimetable.className = "px-4 py-2 border-b-2 border-transparent text-slate-500 hover:text-slate-700 font-medium outline-none transition-colors select-none whitespace-nowrap";
    tabDiagram.className = "px-4 py-2 border-b-2 border-transparent text-slate-500 hover:text-slate-700 font-medium outline-none transition-colors select-none whitespace-nowrap";
    tabUnyo.className = "px-4 py-2 border-b-2 border-transparent text-slate-500 hover:text-slate-700 font-medium outline-none transition-colors select-none whitespace-nowrap";
    viewTimetable.classList.add('hidden');
    viewDiagram.classList.add('hidden');
    viewUnyo.classList.add('hidden');
}

tabTimetable.onclick = () => {
    resetTabs();
    tabTimetable.className = "px-4 py-2 border-b-2 border-blue-600 text-blue-600 font-bold outline-none transition-colors select-none whitespace-nowrap";
    viewTimetable.classList.remove('hidden');
};

tabDiagram.onclick = () => {
    resetTabs();
    tabDiagram.className = "px-4 py-2 border-b-2 border-blue-600 text-blue-600 font-bold outline-none transition-colors select-none whitespace-nowrap";
    viewDiagram.classList.remove('hidden');
    renderDiagram();
};

tabUnyo.onclick = () => {
    resetTabs();
    tabUnyo.className = "px-4 py-2 border-b-2 border-blue-600 text-blue-600 font-bold outline-none transition-colors select-none whitespace-nowrap";
    viewUnyo.classList.remove('hidden');
};

// ページ読み込み時に初期データを表示
window.addEventListener('DOMContentLoaded', () => {
    // ... (既存のコードそのまま) ...
    try {
        diagNeedsInit = true;
        data = parseOuDia(defaultDataText);
        const sel = document.getElementById('station-select');
        sel.innerHTML = data.stations.map((s, i) => `<option value="${i}">${s.name}</option>`).join('');
        
        document.getElementById('nobori-title').textContent = data.noboriAlias ? `上り (${data.noboriAlias})` : '上り';
        document.getElementById('kudari-title').textContent = data.kudariAlias ? `下り (${data.kudariAlias})` : '下り';

        sel.onchange = renderAll;
        document.getElementById('results').classList.remove('hidden');
        renderAll();
    } catch(err) {
        console.error(err);
    }
});

// 以降、元々あったOuDiaのパース関数や描画関数をそのまま残してください。
// parseOuDia(), formatTime(), parseTimeToMinutes(), renderTable(), renderAll(), renderDiagram() 等
</script>
</body>
